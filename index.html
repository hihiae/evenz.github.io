<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Get Your Key</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2.5rem; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); width: 320px; border: 1px solid #333; }
        h2 { color: #4CAF50; margin-bottom: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background: #45a049; transform: scale(1.02); }
        button:disabled { background: #555; cursor: not-allowed; }
        #keyDisplay { margin-top: 25px; font-weight: bold; color: #ffeb3b; font-size: 20px; min-height: 40px; word-break: break-all; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SUCCESS!</h2>
        <p style="color: #aaa; font-size: 14px;">Bạn đã vượt link thành công.</p>
        <button id="btnCreate" onclick="getKey()">CREATE KEY (12H)</button>
        <div id="keyDisplay">Chưa có mã</div>
    </div>

    <script>
    async function getKey() {
        const display = document.getElementById('keyDisplay');
        const btn = document.getElementById('btnCreate');
        
        display.innerText = "Đang kết nối API...";
        btn.disabled = true;

        const targetUrl = 'http://fi12.bot-hosting.cloud:20112/generate-key';
        // Sử dụng Proxy AllOrigins để tránh lỗi 403 và Mixed Content
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&ts=${Date.now()}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Proxy bị lỗi");

            const wrapper = await response.json();
            // AllOrigins bọc dữ liệu trong field contents dưới dạng String
            const data = JSON.parse(wrapper.contents);

            if (data.key) {
                display.innerText = data.key;
                // Tự động copy vào bộ nhớ cho user
                navigator.clipboard.writeText(data.key);
                alert("Đã tự động Copy Key!");
            } else if (data.detail) {
                display.innerText = "Lỗi: " + data.detail;
            }
        } catch (error) {
            console.error("Chi tiết lỗi:", error);
            display.innerText = "Lỗi kết nối API! Hãy thử lại sau.";
        } finally {
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
