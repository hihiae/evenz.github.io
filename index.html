<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Get Your Key</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .card { background: #2a2a2a; padding: 2rem; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #keyDisplay { margin-top: 20px; font-weight: bold; color: #ffeb3b; font-size: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Vượt lỗi thành công!</h2>
        <p>Chọn loại key bạn muốn nhận:</p>
        <button onclick="getKey('12h')">Nhận Key 12 Giờ</button>
        <button onclick="getKey('1d')">Nhận Key 1 Ngày</button>
        <div id="keyDisplay"></div>
    </div>

    <script>
        async function getKey(duration) {
            const response = await fetch('fi12.bot-hosting.cloud:20112/generate-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duration: duration })
            });
            const data = await response.json();
            document.getElementById('keyDisplay').innerText = "Key của bạn: " + data.key;
        }
    </script>
</body>
</html>
