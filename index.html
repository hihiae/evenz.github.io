<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Key</title>
    <style>
        /* CSS Reset để đảm bảo không bị lặp giao diện */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #121212; 
            color: white; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 2.5rem; 
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            width: 350px; 
            border: 1px solid #333; 
        }
        h2 { color: #4CAF50; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 20px; font-size: 14px; }
        button { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        button:hover { background: #45a049; transform: scale(1.02); }
        button:disabled { background: #555; opacity: 0.6; }
        #keyDisplay { 
            margin-top: 25px; 
            font-weight: bold; 
            color: #ffeb3b; 
            font-size: 18px; 
            word-break: break-all; 
            padding: 15px;
            background: #252525;
            border-radius: 5px;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Hệ Thống Key</h2>
        <p>Bấm nút bên dưới để nhận mã 12H</p>
        <button id="btnCreate" onclick="getKey()">Create Key</button>
        <div id="keyDisplay">Chưa có mã</div>
    </div>

    <script>
    async function getKey() {
        const display = document.getElementById('keyDisplay');
        const btn = document.getElementById('btnCreate');
        
        display.innerText = "Đang kết nối API...";
        btn.disabled = true;

        // URL API của ông
        const targetUrl = 'http://fi12.bot-hosting.cloud:20112/generate-key';
        
        // Sử dụng AllOrigins để vượt lỗi Mixed Content (HTTPS sang HTTP)
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&ts=${Date.now()}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Proxy sập");

            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if (data.key) {
                display.innerText = data.key;
                // Copy tự động
                navigator.clipboard.writeText(data.key).then(() => {
                    alert("Đã tự động copy Key!");
                });
            } else {
                display.innerText = "Lỗi: " + (data.detail || "Không rõ lỗi");
            }
        } catch (error) {
            console.error(error);
            display.innerText = "Lỗi kết nối! Kiểm tra API hoặc Proxy.";
        } finally {
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
