<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Get Your Key</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .card { background: #2a2a2a; padding: 2rem; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #keyDisplay { margin-top: 20px; font-weight: bold; color: #ffeb3b; font-size: 20px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Vượt lỗi thành công!</h2>
        <p>Bấm nút bên dưới để lấy Key 12H</p>
        <button onclick="getKey()">Create Key</button>
        <div id="keyDisplay"></div>
    </div>

    <script>
    async function getKey() {
        const display = document.getElementById('keyDisplay');
        display.innerText = "Đang khởi tạo...";

        try {
            // Nhớ dùng đúng Port 20112 như ông đã config ở API
            const response = await fetch('http://fi12.bot-hosting.cloud:20112/generate-key', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            if (response.ok) {
                display.innerText = "Key của bạn: " + data.key;
            } else {
                // Hiển thị lỗi từ FastAPI (ví dụ lỗi 429: quá 2 key)
                display.innerText = "Lỗi: " + (data.detail || "Không thể lấy key");
            }
        } catch (error) {
            display.innerText = "Không thể kết nối API! (Check Port 20112)";
            console.error("Lỗi Fetch:", error);
        }
    }
    </script>
</body>
</html>
